name: Bug Report
description: Report a defect, regression, or unexpected behavior in Hermit.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below
        so we can reproduce and fix the issue as quickly as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal set of steps to reliably reproduce the issue.
      placeholder: |
        1. Run `hermit ...`
        2. Configure `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if applicable.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severely does this bug impact your workflow?
      options:
        - "Critical — blocks all usage or causes data loss"
        - "High — major feature broken, no workaround"
        - "Medium — feature degraded, workaround available"
        - "Low — cosmetic or minor inconvenience"
    validations:
      required: true

  - type: dropdown
    id: affected-layer
    attributes:
      label: Affected Layer
      description: Which layer of Hermit is affected? Select the best match.
      options:
        - "Kernel (task, policy, execution, ledger, verification)"
        - "Runtime (assembly, capability, control, provider_host)"
        - "Plugin (adapter, hook, tool, MCP, bundle, subagent)"
        - "Surface (CLI, TUI)"
        - "Infrastructure (storage, locking, paths, i18n)"
        - "Unknown / Not sure"
    validations:
      required: false

  - type: input
    id: hermit-version
    attributes:
      label: Hermit Version
      description: "Output of `hermit --version` or the commit hash you are running."
      placeholder: "e.g., 0.3.0 or a06c70b"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python --version`."
      placeholder: "e.g., 3.13.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (other)
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: input
    id: install-method
    attributes:
      label: Install Method
      description: How was Hermit installed?
      placeholder: "e.g., uv tool install, git clone + make install, pip install"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Tracebacks
      description: |
        Paste relevant log output, tracebacks, or stderr. Check
        `~/.hermit/logs/` for adapter logs if applicable.
      render: shell
    validations:
      required: false

  - type: textarea
    id: receipts
    attributes:
      label: Receipts / Proof Bundles
      description: |
        If the issue involves governed execution, paste the relevant receipt
        or proof bundle output (from `hermit_task_proof` or `hermit_task_output`).
      render: json
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Add any other context, screenshots, config snippets, or references
        that may help diagnose the issue.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I am running the latest version of Hermit (or have noted my version above).
          required: false
        - label: I have included steps to reproduce the issue.
          required: true
