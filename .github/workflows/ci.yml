name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.15"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Validate version metadata
        run: make version-check

      - name: Run Ruff
        run: uv run ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sync_args: --extra dev
            shard: 1
            shard_total: 2
          - os: ubuntu-latest
            sync_args: --extra dev
            shard: 2
            shard_total: 2
          - os: macos-latest
            sync_args: --extra dev --extra macos
            shard: 1
            shard_total: 2
          - os: macos-latest
            sync_args: --extra dev --extra macos
            shard: 2
            shard_total: 2

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.15"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync ${{ matrix.sync_args }}

      - name: Select test shard
        run: |
          python - <<'PY' > .pytest-shard
          from pathlib import Path

          files = sorted(str(path) for path in Path("tests").glob("test*.py"))
          shard = ${{ matrix.shard }}
          shard_total = ${{ matrix.shard_total }}
          selected = [path for index, path in enumerate(files) if index % shard_total == shard - 1]

          if not selected:
              raise SystemExit(f"no tests selected for shard {shard}/{shard_total}")

          print("\n".join(selected))
          PY
          echo "Shard ${{ matrix.shard }}/${{ matrix.shard_total }} will run:"
          cat .pytest-shard

      - name: Run test suite
        run: uv run pytest -q $(tr '\n' ' ' < .pytest-shard)

  package:
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.15"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Build distributions
        run: make build

      - name: Validate package metadata
        run: make package-check

      - name: Smoke test installation
        run: make install-check

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: hermit-dist
          path: dist/*

  macos-dmg:
    needs:
      - lint
      - test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.15"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --extra dev --extra macos

      - name: Build macOS DMG
        run: make mac-dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v6
        with:
          name: hermit-macos-dmg
          path: dist/*.dmg
