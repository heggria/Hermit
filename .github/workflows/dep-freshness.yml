name: Dependency Freshness

on:
  schedule:
    - cron: '23 3 * * 1-5'  # Weekdays ~03:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Check for upgradable dependencies
        run: |
          echo "## Current lock state" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv lock --upgrade --dry-run 2>&1 | tee /tmp/upgrade-check.txt || true
          cat /tmp/upgrade-check.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Count upgradable packages
          upgrades=$(grep -c 'would upgrade' /tmp/upgrade-check.txt 2>/dev/null || echo "0")
          echo "**${upgrades} package(s) have available upgrades**" >> "$GITHUB_STEP_SUMMARY"
