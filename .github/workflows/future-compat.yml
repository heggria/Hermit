name: Future Compat

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: future-compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-prerelease:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@b75dde52aef63a238519e7aecbbe79a4a52e4315
        with:
          enable-cache: true

      - name: Set up Python prerelease
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.15"
          allow-prereleases: true

      - name: Sync test environment
        run: uv sync --group dev --group typecheck

      - name: Run smoke gates
        run: |
          make lint
          make typecheck
          make test-quick
