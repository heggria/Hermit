name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish, for example v0.1.0
        required: true
        type: string

jobs:
  build-python:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout "${{ steps.vars.outputs.release_tag }}"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Sync release environment
        run: uv sync --group dev --group typecheck --group docs --group security --group release

      - name: Verify project and release metadata
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
        run: |
          uv run python scripts/check_release_version.py --tag "$RELEASE_TAG"
          make verify-release

      - name: Build distributions
        run: make build

      - name: Generate release assets
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
        run: |
          make sbom
          uv run python scripts/check_release_version.py --tag "$RELEASE_TAG" --dist-dir dist
          shasum -a 256 dist/* > dist/SHA256SUMS.txt
          uv run python scripts/generate_release_notes.py --tag "$RELEASE_TAG" --output dist/RELEASE_NOTES.md
          mkdir -p pypi-dist
          cp dist/*.whl dist/*.tar.gz pypi-dist/

      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hermit-release-python-dist
          path: dist/*

      - name: Upload PyPI distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hermit-release-pypi-dist
          path: pypi-dist/*

  build-macos-dmg:
    needs: build-python
    runs-on: macos-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout "${{ steps.vars.outputs.release_tag }}"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Sync macOS release environment
        run: uv sync --group dev --group release --extra macos

      - name: Validate release metadata
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
        run: uv run python scripts/check_release_version.py --tag "$RELEASE_TAG"

      - name: Build macOS DMG
        run: make mac-dmg

      - name: Upload macOS DMG bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hermit-release-macos-dmg
          path: dist/*.dmg

  publish-pypi:
    needs: build-python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/hermit-agent/

    steps:
      - name: Download PyPI distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: hermit-release-pypi-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: dist

  attest-python:
    needs: build-python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: hermit-release-python-dist
          path: dist

      - name: Attest Python release bundle
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: "dist/*"

  attest-macos:
    needs: build-macos-dmg
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Download macOS DMG bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: hermit-release-macos-dmg
          path: macos-dmg

      - name: Attest macOS DMG bundle
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: "macos-dmg/*"

  github-release:
    needs:
      - build-python
      - build-macos-dmg
      - publish-pypi
      - attest-python
      - attest-macos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: hermit-release-python-dist
          path: dist

      - name: Download macOS DMG bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: hermit-release-macos-dmg
          path: macos-dmg

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ needs.build-python.outputs.release_tag }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*
            macos-dmg/*
