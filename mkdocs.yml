site_name: Hermit
site_description: Local-first governed agent kernel for durable and inspectable AI work.
site_url: https://heggria.github.io/Hermit/
repo_url: https://github.com/heggria/Hermit
repo_name: heggria/Hermit
docs_dir: docs
site_dir: site
strict: true
exclude_docs: |
  oss-docs-redesign-proposal.md
  wiki-home.md
  ecosystem-submissions.md
  getting-started.zh-CN.md
  why-hermit.zh-CN.md

plugins:
  - search
  - social:
      enabled: !ENV [CI, false]
  - blog:
      blog_dir: blog
      post_date_format: yyyy-MM-dd
      blog_toc: true
  - tags
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
      image: https://heggria.github.io/Hermit/assets/social-preview.png

theme:
  name: material
  language: en
  logo: assets/hermit-macos-icon.svg
  favicon: assets/hermit-macos-icon.svg
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: deep purple
      accent: deep purple
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/heggria/Hermit
    - icon: fontawesome/brands/discord
      link: https://discord.gg/XCYqF3SN
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/hermit-agent/
    - icon: fontawesome/solid/rss
      link: /Hermit/feed_rss_created.xml

extra_css:
  - stylesheets/landing.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Demo Flows: demo-flows.md
  - Why Hermit: why-hermit.md
  - Comparisons: comparisons.md
  - Design Philosophy: design-philosophy.md
  - Architecture: architecture.md
  - Governance: governance.md
  - Task Lifecycle: task-lifecycle.md
  - Receipts And Proofs: receipts-and-proofs.md
  - Configuration: configuration.md
  - CLI And Operations: cli-and-operations.md
  - Providers And Profiles: providers-and-profiles.md
  - Desktop Companion: desktop-companion.md
  - Serve Troubleshooting: serve-troubleshooting.md
  - FAQ: faq.md
  - Roadmap: roadmap.md
  - Status And Compatibility: status-and-compatibility.md
  - Blog: blog/index.md
  - Tags: tags.md
