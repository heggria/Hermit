[plugin]
name = "scheduler"
version = "0.1.0"
description_key = "plugin.scheduler.description"
description = "Scheduled task execution — cron-like precise timing with persistent storage and hook-based result broadcast"
author = "Hermit"
builtin = true

[entry]
tools = "tools:register"
hooks = "hooks:register"

[variables.scheduler_enabled]
setting = "scheduler_enabled"
env = ["HERMIT_SCHEDULER_ENABLED"]
default = true
description_key = "plugin.scheduler.variable.enabled"
description = "Enable scheduler lifecycle on serve"

[variables.scheduler_catch_up]
setting = "scheduler_catch_up"
env = ["HERMIT_SCHEDULER_CATCH_UP"]
default = true
description_key = "plugin.scheduler.variable.catch_up"
description = "Catch up missed jobs on startup"

[variables.scheduler_feishu_chat_id]
setting = "scheduler_feishu_chat_id"
env = ["HERMIT_SCHEDULER_FEISHU_CHAT_ID"]
description_key = "plugin.scheduler.variable.feishu_chat_id"
description = "Default Feishu chat for scheduler notifications"
