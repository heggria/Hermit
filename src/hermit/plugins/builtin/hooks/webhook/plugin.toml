[plugin]
name = "webhook"
version = "0.1.0"
description_key = "plugin.webhook.description"
description = "HTTP webhook receiver — event-driven agent dispatch with configurable routes and signature verification"
author = "Hermit"
builtin = true

[entry]
hooks = "hooks:register"
tools = "tools:register"

[variables.webhook_enabled]
setting = "webhook_enabled"
env = ["HERMIT_WEBHOOK_ENABLED"]
default = true
description_key = "plugin.webhook.variable.enabled"
description = "Enable webhook server on serve"

[variables.webhook_host]
setting = "webhook_host"
env = ["HERMIT_WEBHOOK_HOST"]
default = "0.0.0.0"
description_key = "plugin.webhook.variable.host"
description = "Webhook bind host"

[variables.webhook_port]
setting = "webhook_port"
env = ["HERMIT_WEBHOOK_PORT"]
default = 8321
description_key = "plugin.webhook.variable.port"
description = "Webhook bind port"
